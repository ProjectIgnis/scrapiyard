---!function
name: HasSelfDiscardCost
namespace: Effect
description: Checks if an [Effect](/api/types/Effect) has a cost that discards the activating card itself.
summary: Checks if an effect has a cost that discards the activating card itself.
status:
  index: stable
parameters:
  - name: e
    type: [ Effect ]
    description: The effect to check the cost of.
returns:
  - type: [ bool ]
    description: >-
      `true` if `e` has a cost that discards the activating card, `false` otherwise.
